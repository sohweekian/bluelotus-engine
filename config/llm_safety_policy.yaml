forbidden_terms:
  - place_order
  - unlock_trade
  - modify_order
  - cancel_order
  - auto_execute
  - route_order
  - buy 100 shares
  - sell 100 shares
  - execute trade
  - trade password

allowed_action_language:
  - WAIT
  - HOLD
  - REVIEW
  - MANUAL_REVIEW_REQUIRED
  - CIO_VERIFICATION_REQUIRED
  - RISK_REVIEW_REQUIRED
  - THESIS_REVIEW_REQUIRED
  - REDUCE_RISK_REVIEW
  - RAISE_CASH_REVIEW
  - HEDGE_REVIEW
  - MANUAL_BUY_REVIEW
  - MANUAL_SELL_REVIEW

doctrine:
  manual_execution_only: true
  broker_execution_forbidden: true
  llm_order_generation_forbidden: true
  deterministic_operator_blocks_must_be_respected: true
