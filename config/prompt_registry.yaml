    agent_id: sentiment_narrative

  # GOLD SAFEHAVEN (future agent)
  gold_safehaven_role:
    path: prompts/agents/gold_safehaven/role.md
    role: default_specialist
    type: agent_role
    required: false
    agent_id: gold_safehaven
    notes: >
      Not yet in execution_queue.yaml. required: false until
      agent is activated in agent_registry and execution_queue.

  gold_safehaven_template:
    path: prompts/agents/gold_safehaven/template.md
    role: default_specialist
    type: agent_template
    required: false
    agent_id: gold_safehaven

  # CHIEF STRATEGIST (synthesis engine)
  chief_strategist_role:
    path: prompts/agents/chief_strategist/role.md
    role: synthesis_engine
    type: agent_role
    required: true
    agent_id: chief_strategist
    notes: >
      Chief Strategist is deterministic, not LLM-driven.
      role.md defines synthesis rules and output format.
      template.md defines the CIO briefing JSON schema hint.

  chief_strategist_template:
    path: prompts/agents/chief_strategist/template.md
    role: synthesis_engine
    type: agent_template
    required: true
    agent_id: chief_strategist
