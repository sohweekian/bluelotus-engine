  # FORECASTING BRIER
  forecasting_brier_role:
    path: prompts/agents/forecasting_brier/role.md
    role: default_specialist
    type: agent_role
    required: true
    agent_id: forecasting_brier

  forecasting_brier_template:
    path: prompts/agents/forecasting_brier/template.md
    role: default_specialist
    type: agent_template
    required: true
