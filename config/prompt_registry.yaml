    required: true
    agent_id: catalyst_intelligence

  # THESIS LIFECYCLE
  thesis_lifecycle_role:
    path: prompts/agents/thesis_lifecycle/role.md
    role: default_specialist
    type: agent_role
    required: true
    agent_id: thesis_lifecycle

  thesis_lifecycle_template:
    path: prompts/agents/thesis_lifecycle/template.md
    role: default_specialist
