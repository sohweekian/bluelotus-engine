database:
  host_env: V3_MYSQL_HOST
  port_env: V3_MYSQL_PORT
  database_env: V3_MYSQL_DATABASE
  user_env: V3_MYSQL_USER
  password_env: V3_MYSQL_PASSWORD
  protected_database_env: V3_PROTECTED_DATABASE
  schema_path_env: V3_DB_SCHEMA_PATH
  legacy_intelligence_schema_path_env: V3_LEGACY_INTELLIGENCE_SCHEMA_PATH
  doctrine_seed_path_env: V3_DOCTRINE_SEED_PATH
  connection_timeout_seconds: 10
  charset: utf8mb4
  collation: utf8mb4_unicode_ci

tables:
  cycle_runs: v3_cycle_runs
  operator_verdict_packs: v3_operator_verdict_packs
  agent_reports: v3_agent_reports
  chief_strategist_briefings: v3_chief_strategist_briefings
  disagreement_logs: v3_disagreement_logs
  cio_action_menus: v3_cio_action_menus
  thesis_states: v3_thesis_states
  learning_snapshots: v3_learning_snapshots
  system_health_log: v3_system_health_log

persistence:
  file_archive_first: true
  fail_cycle_on_db_error: false
  write_news_reporter_to_db: false

schema:
  apply_legacy_intelligence_schema: true
