# confidence: LOW (calibration_n < 10) | MEDIUM (10-29) | HIGH (30+)
# All initial values are expert-estimated. Brier calibration loop updates lr and calibration_n post-resolution.
#
# ANTI-HARDCODE: Do not put lr values in Python code. All values live here.
#
# Source: BlueLotus_NITE_PEI_Integrated_Thesis.md §7
# Author: CIO Soh Wee Kian + Dr. Claude Code, 2026-06-21

