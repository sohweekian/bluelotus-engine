# BlueLotus V3 — NITE-PEI Likelihood Ratio Table
# =================================================
# Schema: lr_table[event_class][thesis_type] = {lr, confidence, calibration_n, last_calibrated_sgt}
#
# LR > 1.0 : Event is evidence FOR the thesis (raises probability)
# LR < 1.0 : Event is evidence AGAINST the thesis (lowers probability)
# LR = 1.0 : Event carries no information about the thesis (no update)
